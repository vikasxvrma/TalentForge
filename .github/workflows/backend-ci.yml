name: Backend CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/**"
      - "docker-compose.yml"

  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/**"
      - "docker-compose.yml"

jobs:
  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Update npm
        run: npm install -g npm@11.6.2
      - name: Debug Workspace
        run: |
          pwd
          node -v
          npm -v
          ls
          ls -la
          
      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Docker Image
        run: docker build -t talentforge-backend .