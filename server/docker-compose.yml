services:
  backend:
    build: .

    ports:
      - "3000:3000"

    env_file:
      - .env.docker

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

    restart: unless-stopped

  postgres:
    image: postgres:17

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talentforge"]
      interval: 10s
      timeout: 5s
      retries: 5


    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talentforge

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant

    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:6333/collections"]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

volumes:
  postgres_data:

  qdrant_data:
